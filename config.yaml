# ─────────────────────────────────────────────────────────────
# FIREBASE ANALYTICS — MODEL CONFIG
# ─────────────────────────────────────────────────────────────
# Set provider to: local | anthropic | openai | gemini | groq
#
# Pandas parses the CSV and computes metrics locally.
# insight = one LLM call used to interpret the metrics and write the report.
# ─────────────────────────────────────────────────────────────

insight:
  provider: groq              # switch to: local | anthropic | openai | gemini | groq
  model: llama-3.3-70b-versatile   # optional; defaults per provider if omitted
  api_key_env: GROQ_API_KEY        # optional; defaults per provider if omitted
  max_tokens: 1000            # final report length
  temperature: 0.1
  max_retries: 3
  retry_base_delay_seconds: 30
  max_prompt_chars: 14000     # keep Groq free-tier requests under TPM limits

# ── Local model options ────────────────────────────────────────
# provider: local
